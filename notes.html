<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Bootstrap CSS removed — replaced by Tailwind + custom CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="css/tailwind.css">
  <link rel="stylesheet" href="css/main.css">
  <script src="js/theme-toggle.js"></script>
</head>

<body>

  <!-- ─── Activity Bar (icon strip, far left) ─────────────────── -->
  <aside class="activity-bar">
    <div class="activity-bar-top">
      <a href="index.html" class="activity-icon">
        <i class="fa-solid fa-list-check"></i>
        <span class="btn-title">To-Do List</span>
      </a>
      <a href="notes.html" class="activity-icon active">
        <i class="fa-solid fa-note-sticky"></i>
        <span class="btn-title">Notes</span>
      </a>
    </div>
    <div class="activity-bar-bottom">
      <button id="export-notes-btn" class="activity-icon" type="button">
        <i class="fa-solid fa-download"></i>
        <span class="btn-title">Export Notes JSON</span>
      </button>
      <button id="import-notes-btn" class="activity-icon" type="button">
        <i class="fa-solid fa-upload"></i>
        <span class="btn-title">Import Notes JSON</span>
      </button>
      <button id="theme-toggle-btn" class="activity-icon" type="button">
        <i class="fa-solid fa-sun"></i>
        <span class="btn-title">Toggle Theme</span>
      </button>
    </div>
  </aside>

  <!-- ─── Floating Alerts ─────────────────────────────────────── -->
  <div class="alerts-floating">
    <div id="success-message" class="alert alert-success" role="alert" style="display:none">Success!</div>
    <div id="failure-message" class="alert alert-danger" role="alert" style="display:none">Failures!</div>
  </div>

  <!-- ─── Main Content ──────────────────────────────────────────── -->
  <div id="app-shell">
    <h5 id="notes-detail-title" class="px-5 pt-3 pb-1 font-semibold text-sm truncate">Title</h5>
    <div id="notes-detail-container"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script type="module" src="js/notes-detail.js"></script>
  <script type="module" src="js/notes-listeners.js"></script>

</body>

</html>
