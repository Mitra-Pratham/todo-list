<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List & Notes App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS removed — replaced by Tailwind + custom CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/tailwind.css">
    <link rel="stylesheet" href="css/main.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
</head>

<body>

    <!-- ─── Activity Bar (icon strip, far left) ─────────────────── -->
    <aside class="activity-bar">
        <div class="activity-bar-top">
            <a href="index.html" class="activity-icon active" title="To-Do List">
                <i class="fa-solid fa-list-check"></i>
            </a>
            <button id="calendar-toggle-btn" class="activity-icon" type="button" title="Calendar">
                <i class="fa-solid fa-calendar-days"></i>
            </button>
            <a href="notes.html" class="activity-icon" title="Notes">
                <i class="fa-solid fa-note-sticky"></i>
            </a>
            <button id="create-toggle-btn" class="activity-icon" type="button" title="Create Date List">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>
        <div class="activity-bar-bottom">
            <div id="auth-container">
                <button id="login-btn" class="activity-icon" title="Login with Google">
                    <i class="fa-brands fa-google"></i>
                </button>
                <div id="user-profile" class="hidden">
                    <button id="logout-btn" class="activity-icon" title="Logout">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </div>
        </div>
    </aside>

    <!-- ─── Create Popover (date picker) ────────────────────────── -->
    <div id="create-popover" class="create-popover hidden">
        <div id="todo-date-form">
            <label class="create-popover-label">New Date List</label>
            <input type="date" class="form-control" id="todo-date-input">
            <button id="todo-date-submit" type="button" class="btn btn-sm btn-primary w-full mt-2">
                <i class="fa-solid fa-plus mr-1"></i>Create
            </button>
        </div>
    </div>

    <!-- ─── Floating Alerts ─────────────────────────────────────── -->
    <div class="alerts-floating">
        <div id="success-message" class="alert alert-success" role="alert">Success!</div>
        <div id="failure-message" class="alert alert-danger" role="alert">Failures!</div>
    </div>

    <!-- ─── Main Layout (sidebar + content) ─────────────────────── -->
    <div id="app-shell">
        <div id="date-parent-container">
            <div id="date-list-nav-container"></div>
            <div id="date-list-container"></div>
        </div>

        <div id="calendar-container" class="hidden">
            <div class="calendar-layout">
                <div class="calendar-sidebar">
                    <div id="mini-calendar"></div>
                    <div class="calendar-filters mt-3">
                        <h6 class="font-bold mb-2">Task Filters</h6>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="filter-all" checked>
                            <label class="form-check-label" for="filter-all">
                                <span class="filter-dot filter-dot-all"></span> View All
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="filter-todo" checked>
                            <label class="form-check-label" for="filter-todo">
                                <span class="filter-dot filter-dot-todo"></span> To-Do
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="filter-completed" checked>
                            <label class="form-check-label" for="filter-completed">
                                <span class="filter-dot filter-dot-completed"></span> Completed
                            </label>
                        </div>
                    </div>
                </div>
                <div class="calendar-main">
                    <div id="fullcalendar"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="offcanvas offcanvas-end" data-bs-scroll="true" data-bs-backdrop="false" id="task-detail-container">

    </div>
    <div id="context-menu">

        <ul class="list-group">
            <li class="list-group-item"><button id="ctx-done-btn" class="btn btn-sm btn-no-bg">
                    <i class="fa-solid fa-circle-check mr-2"></i>
                    <span>Mark as Done/Undone</span>
                </button>
            </li>
            <li class="list-group-item"><button id="ctx-delete-btn" class="btn btn-sm btn-no-bg">
                    <i class="fa-solid fa-trash mr-2"></i>
                    <span>Delete</span>
                </button>
            </li>
        </ul>
    </div>

</body>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
<script type="module" src="js/refresh-worker.js"></script>
<script type="module" src="js/main.js"></script>
<script type="module" src="js/listeners.js"></script>
<script type="module" src="js/drag.js"></script>
<script type="module" src="js/calendar.js"></script>

</html>
