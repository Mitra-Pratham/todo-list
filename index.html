<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List & Notes App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/main.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <!-- <a class="navbar-brand" href="#">Navbar</a> -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-between" id="navbarNavAltMarkup">
                <div id="todo-date-form" class="my-sm-2">
                    <div class="d-flex align-items-center">
                        <input type="date" class="form-control" id="todo-date-input">
                        <button id="todo-date-submit" type="button" class="btn btn-sm btn-lite-bg ms-2">
                            <i class="fa-solid fa-plus"></i>
                            <span>Create Date List</span>
                        </button>
                    </div>
                    <div class="alerts">
                        <div id="success-message" class="alert alert-success" role="alert">
                            Success!
                        </div>
                        <div id="failure-message" class="alert alert-danger" role="alert">
                            Failures!
                        </div>
                    </div>
                </div>

                <div class="navbar-nav align-items-center">
                    <button id="calendar-toggle-btn" class="nav-link me-2" type="button">
                        <i class="fa-solid fa-calendar-days me-2"></i>Calendar
                    </button>
                    <a class="nav-link nav-active" href="index.html">To-Do List</a>
                    <a class="nav-link ms-2" href="notes.html">Notes</a>

                    <!-- Auth UI -->
                    <div id="auth-container" class="ms-3">
                        <button id="login-btn" class="btn btn-primary btn-sm">
                            <i class="fa-brands fa-google me-2"></i>Login
                        </button>
                        <div id="user-profile" class="d-flex align-items-center d-none">
                            <span id="user-name" class="me-2 fw-bold"></span>
                            <button id="logout-btn" class="btn btn-outline-danger btn-sm">Logout</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>


    <div class="my-3">
        <div class="container-fluid">
            <div id="date-parent-container">
                <div id="date-list-nav-container" class="p-2"></div>
                <div id="date-list-container"></div>
            </div>
            <div id="calendar-container" class="d-none">
                <div class="calendar-layout">
                    <div class="calendar-sidebar">
                        <div id="mini-calendar"></div>
                        <div class="calendar-filters mt-3">
                            <h6 class="fw-bold mb-2">Task Filters</h6>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="filter-all" checked>
                                <label class="form-check-label" for="filter-all">
                                    <span class="filter-dot filter-dot-all"></span> View All
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="filter-todo" checked>
                                <label class="form-check-label" for="filter-todo">
                                    <span class="filter-dot filter-dot-todo"></span> To-Do
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="filter-completed" checked>
                                <label class="form-check-label" for="filter-completed">
                                    <span class="filter-dot filter-dot-completed"></span> Completed
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="calendar-main">
                        <div id="fullcalendar"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <div class="offcanvas offcanvas-end" data-bs-scroll="true" data-bs-backdrop="false" id="task-detail-container">

    </div>
    <div id="context-menu">

        <ul class="list-group">
            <li class="list-group-item"><button class="btn btn-sm btn-no-bg" onclick="doneSelectedList()">
                    <i class="fa-solid fa-circle-check me-2"></i>
                    <span>Mark as Done/Undone</span>
                </button>
            </li>
            <li class="list-group-item"><button class="btn btn-sm btn-no-bg" onclick="deleteSelectedList()">
                    <i class="fa-solid fa-trash me-2"></i>
                    <span>Delete</span>
                </button>
            </li>
        </ul>
    </div>

</body>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
<script src="js/refresh-worker.js"></script>
<script src="js/todo-variables.js"></script>
<script src="js/utils.js"></script>
<script src="js/notes-common.js"></script>
<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/todo-service.js"></script>
<script type="module" src="js/main.js"></script>
<script src="js/listeners.js"></script>
<script src="js/drag.js"></script>
<script src="js/calendar.js"></script>

</html>
